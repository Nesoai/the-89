<html lang="en">

<title>The 89 — the complete merged canon</title>
<meta name="description" content="The 89: study the complete merged canon — Tanakh, Apocrypha, and the Ethiopian 81 — in binge-worthy lessons, a browsable 89-book library, streaks, XP, and Scroll Trials.">

<style>
:root{
  --bg:#110c07; --ink:#f2e9d6; --dim:#bcae91; --faint:#7d7159;
  --a1:#e0b25e; --a2:#c96f43; --a3:#9c4040;
  --card:rgba(240,224,192,.05); --line:rgba(224,178,94,.22);
  --r:20px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;font-size:16.5px;line-height:1.6;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:Fraunces,serif;font-weight:600;line-height:1.15;margin:0}
button{font-family:inherit;cursor:pointer}
::selection{background:rgba(224,178,94,.35)}

/* ---- ambient aurora ---- */
.blob{position:fixed;border-radius:50%;filter:blur(110px);opacity:.22;z-index:0;pointer-events:none;animation:blobdrift 26s ease-in-out infinite alternate}
#b1{width:44vw;height:44vw;background:var(--a1);top:-14vw;left:-10vw}
#b2{width:38vw;height:38vw;background:var(--a2);top:24vh;right:-12vw;animation-delay:-9s}
#b3{width:30vw;height:30vw;background:var(--a3);bottom:-12vw;left:22vw;animation-delay:-17s;opacity:.2}
@keyframes blobdrift{from{transform:translate(0,0) scale(1)}to{transform:translate(6vw,4vh) scale(1.12)}}
#grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;background-image:radial-gradient(rgba(255,255,255,.7) .6px,transparent .6px);background-size:3px 3px}

/* ---- shell ---- */
#app{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:18px 20px 90px}
header{display:flex;align-items:center;gap:12px;padding:6px 0 22px}
#logo{font-family:Fraunces,serif;font-size:24px;font-weight:700;letter-spacing:.5px;cursor:pointer;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;background-clip:text;color:transparent}
.spacer{flex:1}
.chip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:14px;font-weight:600;backdrop-filter:blur(10px);white-space:nowrap}
.chip b{color:var(--ink)}
.chip .sub{color:var(--dim);font-weight:500}
#sndBtn{background:var(--card);border:1px solid var(--line);border-radius:999px;width:38px;height:38px;color:var(--dim);font-size:16px;transition:.2s}
#sndBtn:hover{color:var(--ink);border-color:rgba(255,255,255,.25)}

.view{display:none;animation:fadeup .45s ease}
.view.on{display:block}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---- cards & buttons ---- */
.glass{background:var(--card);border:1px solid var(--line);border-radius:var(--r);backdrop-filter:blur(14px);transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease}
.glass.hover:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.22);box-shadow:0 18px 40px -18px rgba(0,0,0,.7)}
.btn{border:none;border-radius:14px;padding:13px 24px;font-size:15.5px;font-weight:600;color:#171009;background:linear-gradient(92deg,var(--a1),var(--a2));box-shadow:0 8px 26px -8px rgba(201,111,67,.5);transition:transform .18s,box-shadow .18s,filter .18s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);box-shadow:0 14px 34px -8px rgba(201,111,67,.65)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.ghost:hover{border-color:rgba(255,255,255,.3)}
.btn.big{padding:16px 30px;font-size:17px;border-radius:16px}
.tag{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:4px 12px}

/* ---- home ---- */
.hero{padding:30px 30px 26px;margin-bottom:22px;position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(224,178,94,.12),rgba(201,111,67,.1) 55%,rgba(156,64,64,.08));pointer-events:none}
.hero h1{font-size:clamp(28px,4.6vw,42px);margin:10px 0 8px}
.hero p{color:var(--dim);max-width:56ch;margin:0 0 20px}
.heroRow{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.pathcard{padding:22px;cursor:pointer;position:relative}
.pathcard .pemoji{font-size:30px}
.pathcard h3{font-size:20px;margin:10px 0 6px}
.pathcard p{color:var(--dim);font-size:14.5px;margin:0 0 16px;min-height:3em}
.meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim)}
.ring{--p:0;width:44px;height:44px;border-radius:50%;background:conic-gradient(var(--rc,var(--a1)) calc(var(--p)*1%),rgba(255,255,255,.08) 0);display:grid;place-items:center;flex:none}
.ring i{width:34px;height:34px;border-radius:50%;background:#1d150c;display:grid;place-items:center;font-style:normal;font-size:11.5px;font-weight:700}
.rowcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:16px}
.featurecard{padding:22px;cursor:pointer}
.featurecard h3{font-size:19px;margin:8px 0 4px}
.featurecard p{color:var(--dim);font-size:14.5px;margin:0}
.sectionTitle{font-size:22px;margin:34px 0 14px;display:flex;align-items:center;gap:10px}
.sectionTitle:after{content:"";flex:1;height:1px;background:var(--line)}

/* ---- path view ---- */
.back{background:none;border:none;color:var(--dim);font-size:15px;font-weight:600;padding:0;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--ink)}
.pathhead{display:flex;gap:18px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
.pathhead .pemoji{font-size:44px}
.pathhead h2{font-size:clamp(24px,4vw,34px)}
.pathhead p{color:var(--dim);margin:4px 0 0;max-width:60ch}
.lessonrow{display:flex;align-items:center;gap:16px;padding:18px 20px;margin-bottom:12px;cursor:pointer}
.lessonrow .num{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:15px;flex:none}
.lessonrow.done .num{background:linear-gradient(135deg,var(--a1),var(--a2));color:#0a0d18;border:none}
.lessonrow h4{font-size:17px;font-weight:600;font-family:Inter}
.lessonrow .lmeta{font-size:13px;color:var(--dim);margin-top:2px}
.lessonrow .go{margin-left:auto;color:var(--faint);font-size:20px;transition:.2s}
.lessonrow:hover .go{color:var(--ink);transform:translateX(4px)}
.nextpill{font-size:11.5px;font-weight:700;letter-spacing:.6px;color:#171009;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:999px;padding:3px 10px;margin-left:8px;text-transform:uppercase}

/* ---- lesson view ---- */
.lessonwrap{max-width:720px;margin:0 auto}
.progressbar{height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:10px 0 26px}
.progressbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}
.seccard{padding:30px;margin-bottom:16px}
.seccard h3{font-size:clamp(21px,3.4vw,27px);margin-bottom:12px}
.seccard p{color:#c9d0e0;margin:0;font-size:16.5px}
.secfoot{display:flex;gap:10px;margin-top:22px;align-items:center}
.listen{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:9px 16px;font-size:13.5px;font-weight:600;transition:.2s}
.listen:hover{color:var(--ink);border-color:rgba(255,255,255,.3)}
.qopt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;color:var(--ink);padding:15px 18px;font-size:15.5px;font-weight:500;margin-bottom:10px;transition:.18s}
.qopt:hover{border-color:rgba(255,255,255,.3);transform:translateX(4px)}
.qopt.right{background:rgba(224,178,94,.16);border-color:var(--a1)}
.qopt.wrong{background:rgba(156,64,64,.16);border-color:var(--a3);opacity:.75}
.qfeed{min-height:26px;font-weight:600;font-size:14.5px;margin:4px 0 6px}

/* ---- completion overlay ---- */
#done{position:fixed;inset:0;z-index:60;display:none;place-items:center;background:rgba(6,8,16,.75);backdrop-filter:blur(6px)}
#done.on{display:grid}
#doneCard{max-width:440px;width:92vw;padding:36px 32px;text-align:center;animation:fadeup .4s ease}
#doneCard .big{font-size:52px}
#doneCard h2{font-size:26px;margin:10px 0 6px}
#doneCard p{color:var(--dim);margin:0 0 8px}
#doneXp{font-family:Fraunces,serif;font-size:34px;font-weight:700;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;background-clip:text;color:transparent;margin:6px 0 18px}
#nextTease{font-size:14px;color:var(--dim);margin:14px 0 6px}
#nextTease b{color:var(--ink)}

/* ---- arena ---- */
.arenatop{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.combo{font-family:Fraunces,serif;font-weight:700;font-size:20px;background:linear-gradient(90deg,var(--a2),var(--a3));-webkit-background-clip:text;background-clip:text;color:transparent}
.combo.hot{animation:pulse .5s ease}
@keyframes pulse{40%{transform:scale(1.25)}}
.arenaq{padding:28px;margin-bottom:16px}
.arenaq h3{font-size:clamp(19px,3vw,24px);font-family:Inter;font-weight:600}

/* ---- studio ---- */
.breathwrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
#bcircle{width:min(56vw,240px);height:min(56vw,240px);border-radius:50%;background:radial-gradient(circle,rgba(224,178,94,.35),rgba(201,111,67,.2) 60%,transparent 72%);border:1px solid rgba(255,255,255,.18);display:grid;place-items:center;font-family:Fraunces,serif;font-size:21px;transition:transform var(--dur,4s) cubic-bezier(.45,0,.55,1)}
#bcircle.in{transform:scale(1.45)}
#bcircle.hold{transform:scale(1.45)}
#bcircle.out{transform:scale(1)}
.studioopts{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;width:100%}

#bnav{display:none}
@media(max-width:720px){
  body{padding-bottom:70px}
  #bnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--panel);border-top:1px solid var(--line);backdrop-filter:blur(10px)}
  #bnav button{flex:1;background:none;border:none;color:var(--faint);font-family:inherit;font-size:10.5px;font-weight:600;padding:9px 2px calc(9px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:3px;align-items:center;cursor:pointer}
  #bnav button .bi{font-size:20px;line-height:1}
  #bnav button.on{color:var(--a1)}
}
footer{margin-top:60px;text-align:center;color:var(--faint);font-size:13px}
footer a{color:var(--dim)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
/* ============ THE 89 — adult learning engine (shared with Lumen) ============ */
/* DATA_START */
const SITE={
  key:'the89.v1', name:'The 89', vtag:'v1.1',
  heroKicker:'The scroll is open',
  heroTitle:'Eighty-nine books. One story.',
  heroSub:'Study the complete merged canon — the Tanakh, the Apocrypha, and the Ethiopian 81 — in five-minute lessons. Walk the grand story, meet the hidden treasures, and test yourself in the Scroll Trials.',
  levels:[[0,'Seeker'],[150,'Student'],[350,'Scribe'],[700,'Storykeeper'],[1200,'Sage'],[1900,'Elder'],[2800,'Keeper of the 89']],
  arenaName:'Scroll Trials', arenaDesc:'Ten rapid questions across the whole canon. Build a combo, multiply your XP.',
  libraryName:'The Library of 89', libraryDesc:'Every book on one shelf — genre, essence, and key figures at a glance.'
};
const PATHS=[
{emoji:'📏', color:'#e0b25e', title:'Canon 101', refs:[['Biblical canons compared','https://en.wikipedia.org/wiki/Biblical_canon'],['The Orthodox Tewahedo canon','https://en.wikipedia.org/wiki/Orthodox_Tewahedo_biblical_canon'],['The Septuagint','https://en.wikipedia.org/wiki/Septuagint']],
 blurb:'Why Bibles differ — 24, 66, 73, 81 — and how this merged shelf reaches 89.',
 lessons:[
 {t:'What Is a Canon?', mins:4, secs:[
   {h:'The measuring rod',t:'"Canon" comes from a Greek word for a measuring rod: the ruled list of writings a community receives as Scripture. No committee invented it in an afternoon; canons formed over centuries of reading, worship, and debate, as communities recognized which scrolls carried authority among them. A canon is less a fence than a testimony: these are the books that made us who we are.'},
   {h:'The famous numbers',t:'The Jewish Tanakh counts 24 books. The Protestant Bible counts 66; the Catholic, 73; Eastern Orthodox Bibles, roughly 76 to 79. The Ethiopian Orthodox Tewahedo Church holds the broadest canon in the world: 81 books. Same faithlines, different shelves — and most of the difference is a handful of books plus, surprisingly, arithmetic.'},
   {h:'Why the counts differ',t:'Two reasons. First, grouping: the Tanakh counts the Twelve Prophets as one book, Samuel, Kings, and Chronicles as one each, and Ezra–Nechemyah together — split them apart and 24 becomes 39. Second, disputed books: the collections called Apocrypha or Deuterocanon, kept by some traditions and set aside by others. Counting, it turns out, is theology.'}],
  quiz:[
   {q:'"Canon" originally referred to…',a:'A measuring rod or rule',w:['A type of scroll','A church building']},
   {q:'The world\u2019s largest biblical canon belongs to…',a:'The Ethiopian Orthodox Tewahedo Church',w:['The Protestant tradition','The Tanakh']},
   {q:'The Tanakh\u2019s 24 books equal the Protestant 39 because…',a:'The same books are grouped differently',w:['15 books were lost','They are unrelated texts']}]},
 {t:'The Tanakh', mins:4, secs:[
   {h:'Torah, Nevi\u2019im, Ketuvim',t:'"Tanakh" is an acronym: Torah (the five books of teaching), Nevi\u2019im (the Prophets — from Yehoshua through the Twelve), and Ketuvim (the Writings — Psalms, wisdom, scrolls, and Chronicles). Three shelves, ranked in traditional weight: the Torah read through every year in synagogue, the Prophets echoing it, the Writings singing around it.'},
   {h:'A different ending',t:'Order preaches. The Christian Old Testament ends with Malachi\u2019s promise of a coming messenger — a cliffhanger leaning toward the Gospels. The Tanakh ends with 2 Chronicles and Cyrus\u2019s decree: let the exiles go home and rebuild. One arrangement ends in expectation, the other in return. Same books, two closing chords.'},
   {h:'The text itself',t:'The Tanakh comes to us in Hebrew (with some Aramaic) through the Masoretes — medieval scribes who counted every letter and added vowel markings to lock the pronunciation of an already-ancient text. Their care is why a modern scroll matches fragments from the Dead Sea two thousand years older with astonishing fidelity.'}],
  quiz:[
   {q:'The "N" in Tanakh stands for…',a:'Nevi\u2019im — the Prophets',w:['Numbers','Nechemyah']},
   {q:'The Tanakh traditionally ends with…',a:'2 Chronicles and the decree to return',w:['Malachi','Genesis']},
   {q:'The Masoretes were…',a:'Scribes who meticulously preserved the Hebrew text',w:['Roman tax collectors','Greek philosophers']}]},
 {t:'The Apocrypha Story', mins:5, secs:[
   {h:'It starts in Greek',t:'In the centuries before Yehoshua HaMashiach, Jewish communities in Alexandria translated their Scriptures into Greek — the Septuagint. That collection circulated with additional books: Tobit, Judith, Wisdom, Sirach, Baruch, Maccabees, and expanded editions of Ester and Daniel. The early church, largely Greek-speaking, inherited that wider shelf and read it as Scripture for centuries.'},
   {h:'Deuterocanon vs. Apocrypha',t:'The names carry the debate. Catholic and Orthodox traditions call these books "deuterocanonical" — a second tier of canon, still Scripture. The Reformers, favoring the Hebrew shelf, moved them out: Luther printed them as a useful appendix, and the original 1611 King James included them between the Testaments before later printings dropped them. "Apocrypha" — hidden things — became their Protestant name.'},
   {h:'What you actually find there',t:'Inside: two gripping novellas (Tobit, Judith), a Greek-philosophical meditation on immortality (Wisdom of Shlomo), a grandfather\u2019s ethics course (Sirach), war chronicles that explain Hanukkah (Maccabees), a perfect prayer of repentance (Menasheh), and haunting additions to Daniel and Ester. Whatever one\u2019s canon, these shaped centuries of art, prayer, and imagination.'}],
  quiz:[
   {q:'The Septuagint is…',a:'The Greek translation of the Scriptures',w:['A Latin hymnbook','A lost gospel']},
   {q:'The original 1611 King James Bible…',a:'Included the Apocrypha between the Testaments',w:['Never contained it','Was written in Hebrew']},
   {q:'The festival explained by Maccabees is…',a:'Hanukkah',w:['Passover','Pentecost']}]},
 {t:'The Ethiopian 81 — and Our 89', mins:5, secs:[
   {h:'The broadest shelf',t:'The Ethiopian Orthodox Tewahedo Church — among the oldest Christian communities on earth — canonized 81 books, preserved in the classical language Ge\u2019ez. Its shelf includes everything in the wider Greek tradition plus books kept nowhere else: Jubilees, 1 Enoch (Chanoch), the three books of Meqabyan, and an expanded New Testament of church orders and covenant writings.'},
   {h:'The books only Ethiopia saved',t:'Here is the astonishing part: Enoch and Jubilees — texts quoted or beloved across the ancient world, cherished at Qumran — survive complete only in Ge\u2019ez. When Western scholars finally read full Enoch in the 18th century, it came from Ethiopian manuscripts. One church\u2019s faithfulness preserved a library the rest of the world had lost.'},
   {h:'How this site counts 89',t:'The 89 merges three shelves: the Tanakh, the Apocrypha, and the Ethiopian 81. Since Ethiopia\u2019s canon already contains nearly everything, the union adds only 1–2 Maccabees — and because traditional Ethiopian counting groups some books (the Jeremiah writings, for instance), naming every book separately yields 89. It\u2019s honest arithmetic, and every entry sits in the Library for you to meet.'}],
  quiz:[
   {q:'The classical language of the Ethiopian canon is…',a:'Ge\u2019ez',w:['Latin','Sanskrit']},
   {q:'1 Enoch survives complete only because of…',a:'Ethiopian manuscripts',w:['Roman archives','A Viking hoard']},
   {q:'This site\u2019s count reaches 89 by…',a:'Merging three traditions and counting every named book',w:['Adding modern novels','Rounding up from 66']}]}
]},
{emoji:'🕯️', color:'#c96f43', title:'The Grand Story', refs:[['The Hebrew Bible — overview','https://en.wikipedia.org/wiki/Hebrew_Bible'],['Second Temple period','https://en.wikipedia.org/wiki/Second_Temple_period']],
 blurb:'From the garden to the garden-city — the whole canon as one sweeping narrative in five acts.',
 lessons:[
 {t:'Beginnings & Covenant', mins:5, secs:[
   {h:'A good world, wounded',t:'Bereshit (Genesis) opens with Yah speaking a good world into being and placing humans in it as gardeners and image-bearers. Within pages, trust breaks — the fruit, the first murder, a violence that floods the earth. Yet even judgment comes with a lifeboat: Noach, an ark, and a rainbow promise that Yah will not give up on the world.'},
   {h:'One family, for everyone',t:'The story then narrows to widen: Yah calls Avraham with a promise — land, descendants, and blessing that will reach all families of earth. The covenant threads through impossible births, wrestling matches, and a dreamer named Yosef whose betrayal becomes rescue. Genesis ends with the family safe in Egypt — and the trap quietly set.'},
   {h:'The pattern to watch',t:'Notice the rhythm that will repeat for eighty-nine books: human failure, divine faithfulness, a remnant carried through. The canon is not a gallery of heroes; it is one long argument that Yah keeps covenant with people who keep breaking it. Read everything that follows as variations on that theme.'}],
  quiz:[
   {q:'Yah\u2019s promise to Avraham aimed at…',a:'Blessing all families of earth',w:['One city only','Ending all rain']},
   {q:'Genesis ends with the covenant family…',a:'In Egypt',w:['In Babylon','On the ark']},
   {q:'The canon\u2019s repeating pattern is…',a:'Human failure met by divine faithfulness',w:['Uninterrupted success','Random events']}]},
 {t:'Exodus & the Mountain', mins:5, secs:[
   {h:'Out of the house of slavery',t:'Four centuries later, the family has become a nation — enslaved. Yah hears, remembers, and sends a reluctant shepherd: Moshe. Plagues confront an empire\u2019s gods, a lamb\u2019s blood marks doors on Passover night, and the sea itself opens. The exodus becomes the Tanakh\u2019s defining memory: when Israel later asks who Yah is, the answer is "the one who brought you out."'},
   {h:'Sinai: a nation gets a constitution',t:'At the mountain, rescue becomes relationship. The Torah given through Moshe — commandments, feasts, courts, care for the stranger and the poor — reads less like a rulebook than a national constitution for a people meant to display Yah\u2019s character. Leviticus\u2019 refrain says it plainly: be holy, for I am holy.'},
   {h:'Wilderness lessons',t:'Numbers and Deuteronomy carry the nation through forty testing years — manna, grumbling, a bronze serpent, a whole generation\u2019s slow surrender of Egypt\u2019s habits. Deuteronomy is Moshe\u2019s farewell sermon on the border of promise: choose life, love Yah with all your heart. He dies within sight of the land. The story, as ever, continues past its heroes.'}],
  quiz:[
   {q:'The exodus becomes Israel\u2019s…',a:'Defining memory of who Yah is',w:['Least-mentioned event','Only law code']},
   {q:'At Sinai, the Torah functions like…',a:'A covenant constitution',w:['A trade agreement','A war chant']},
   {q:'Deuteronomy is best described as…',a:'Moshe\u2019s farewell sermon',w:['A psalm collection','A census only']}]},
 {t:'Kingdom & Exile', mins:5, secs:[
   {h:'Give us a king',t:'In the land, cycles of drift and rescue (Judges) give way to monarchy: Shaul the tragic first king, then Dovid — shepherd, psalmist, giant-feller, deeply flawed and deeply loved — to whom Yah promises an everlasting throne. Shlomo builds the temple in gold and cedar. It is the story\u2019s high noon, and it does not last a single generation past him.'},
   {h:'Two kingdoms, many warnings',t:'The nation splits: Israel north, Judah south. Enter the prophets — Eliyahu calling down fire, Amos thundering justice, Hoshea marrying heartbreak, Yeshayahu seeing both judgment and a coming Prince of Peace. Prophets are not fortune-tellers; they are covenant lawyers, prosecuting a people for forgetting the poor and the God who freed them.'},
   {h:'586 and the long weeping',t:'Assyria swallows the north; in 586 BCE Babylon burns the temple and marches Judah into exile. Lamentations sits in the ashes; Psalm 137 hangs its harps by foreign rivers. Yet exile becomes the canon\u2019s crucible: Yechezkel sees dry bones dance, Yirmeyahu buys a field as a bet on homecoming, and hope learns to sing in a minor key.'}],
  quiz:[
   {q:'Yah\u2019s promise to Dovid concerned…',a:'An everlasting throne',w:['Endless wealth','A larger army']},
   {q:'The prophets functioned mainly as…',a:'Covenant prosecutors calling for justice',w:['Court entertainers','Mapmakers']},
   {q:'In 586 BCE…',a:'Babylon destroyed the temple and exiled Judah',w:['The temple was built','Rome invaded']}]},
 {t:'Return & the Treasure Centuries', mins:5, secs:[
   {h:'Home, smaller and wiser',t:'Persia\u2019s Cyrus lets the exiles return. Ezra rebuilds the people around the Torah; Nechemyah rebuilds the wall in fifty-two days with a trowel in one hand and a spear in the other. The second temple rises — smaller, and the old men weep remembering the first. The nation survives, humbled, gathered around its book.'},
   {h:'The centuries between',t:'Between Malachi and Matthew stretch four hundred years that only the Treasure shelf narrates. Greek empire washes over Judea; faith is tested in novellas (Tobit, Judith, expanded Ester), argued in philosophy (Wisdom), and codified in a grandfather\u2019s classroom (Sirach). Far from silent, these centuries are where synagogue, scribe, and messianic hope all mature.'},
   {h:'The hammer and the lamps',t:'When a Greek king profanes the temple, a priestly family strikes back: Judah the Maccabee — "the hammer" — retakes Jerusalem and relights the lamps in 164 BCE, the miracle Hanukkah remembers. Maccabean martyrs voice bold new hope in resurrection. Expectation is now fully loaded: a kingdom, a son of Dovid, a world set right. The stage is lit.'}],
  quiz:[
   {q:'Nechemyah is famous for rebuilding…',a:'Jerusalem\u2019s wall in fifty-two days',w:['The ark of Noach','Babylon\u2019s gates']},
   {q:'The 400 years before the Gospels are narrated by…',a:'The Apocrypha and Ethiopian treasure books',w:['No writings at all','The book of Judges']},
   {q:'Hanukkah commemorates…',a:'The temple\u2019s rededication under the Maccabees',w:['The exodus','Creation week']}]},
 {t:'Mashiach & the New Community', mins:5, secs:[
   {h:'The promised one arrives',t:'The Gospels announce the story\u2019s hinge: Yehoshua HaMashiach, born in Beit Lechem of Dovid\u2019s line, teaching in parables, healing, welcoming the forgotten — then executed by empire and, his followers testify, raised on the third day. Each Gospel angles the portrait: Matthew the King, Mark the mover, Luke the friend of outsiders, Yochanan the Word made flesh.'},
   {h:'A fire spreads',t:'Acts watches the covenant promise to Avraham finally go global: the Spirit falls, and the good news runs from Jerusalem through Samaria to Rome itself. Kefa opens the door to the nations; Sha\u2019ul — persecutor turned apostle — plants communities across the empire and writes them letters that become half the New Testament: grace, one family, love as the greatest.'},
   {h:'Garden to garden-city',t:'Revelation closes the canon as Genesis opened it — a tree of life, a river, Yah dwelling with humanity — but now the garden has become a city with open gates and no more tears. The Ethiopian church orders (Sinodos, the Covenant books) show communities learning to live that future early. Eighty-nine books; one long homecoming.'}],
  quiz:[
   {q:'The four Gospels are best read as…',a:'Four angled portraits of one figure',w:['Four unrelated biographies','Legal codes']},
   {q:'In Acts, the Avraham promise…',a:'Extends to all nations',w:['Is cancelled','Applies to Rome only']},
   {q:'Revelation ends the canon with…',a:'A renewed garden-city where Yah dwells with humanity',w:['A return to Egypt','An empty page']}]}
]},
{emoji:'💎', color:'#9b6bd3', title:'Hidden Treasures', refs:[['The Book of Enoch','https://en.wikipedia.org/wiki/Book_of_Enoch'],['The Book of Jubilees','https://en.wikipedia.org/wiki/Book_of_Jubilees'],['Deuterocanonical books','https://en.wikipedia.org/wiki/Deuterocanonical_books']],
 blurb:'Enoch, Jubilees, Tobit, Judith, Maccabees, Meqabyan, and the wisdom voices most Bibles never printed.',
 lessons:[
 {t:'Chanoch (1 Enoch)', mins:5, secs:[
   {h:'The man who walked away',t:'Genesis gives Chanoch one haunting line: he walked with Yah, and he was not, for Yah took him. Around that mystery grew one of antiquity\u2019s most influential books — 1 Enoch — visions of heaven\u2019s courts, fallen Watchers whose corruption explains the flood, cosmic calendars, and a radiant "Son of Man" who judges with justice.'},
   {h:'Everyone was reading it',t:'Enoch saturated the world of the Second Temple: multiple copies at Qumran, echoes across the Gospels\u2019 "Son of Man" language, and an outright quotation in the letter of Yehudah (Jude 14–15). For centuries much of the church read it warmly — before it slid off most canons everywhere except Ethiopia, which kept it as Scripture.'},
   {h:'How to read it now',t:'Read Enoch as apocalyptic literature: dream-grammar, symbol-heavy, more concerned with meaning than reportage. Its questions are startlingly current — where does evil come from, does power answer to anyone, is history going somewhere? Whatever your canon, meeting Enoch makes the New Testament\u2019s thought-world snap into focus.'}],
  quiz:[
   {q:'Genesis says Chanoch…',a:'Walked with Yah and was taken',w:['Built the temple','Fled to Egypt']},
   {q:'1 Enoch is quoted directly in…',a:'The letter of Yehudah (Jude)',w:['Genesis','2 Chronicles']},
   {q:'Enoch belongs to which genre?',a:'Apocalyptic vision literature',w:['Courtroom transcript','Cookbook']}]},
 {t:'Jubilees', mins:4, secs:[
   {h:'Genesis, retold in sevens',t:'Jubilees retells Genesis and early Exodus as an angel\u2019s dictation to Moshe on Sinai — with the whole of history ruled into "jubilees" of forty-nine years. Everything lands on schedule: creation, covenants, exodus. The message under the math: time itself belongs to Yah, and history keeps an appointment book.'},
   {h:'The calendar wars',t:'Jubilees champions a solar calendar of exactly 364 days — fifty-two clean weeks, festivals landing on the same weekday forever — against the drifting lunar count. That sounds dry until you realize communities split over it; the Dead Sea Scrolls sect treasured Jubilees precisely for this. When your feast days define you, the calendar is theology.'},
   {h:'Sabbath at creation\u2019s core',t:'More than anything, Jubilees enthrones the Sabbath — observed by angels before humans existed, woven into creation\u2019s architecture. Kept as Scripture only in Ethiopia\u2019s canon, it offers the adult version of a children\u2019s lesson: rest is not a pause in the story; it is the point the story keeps returning to.'}],
  quiz:[
   {q:'Jubilees structures history in units of…',a:'Forty-nine years',w:['One century','Twelve days']},
   {q:'Its favored calendar was…',a:'A 364-day solar calendar',w:['A 355-day lunar one','No calendar at all']},
   {q:'Jubilees survives as canon in…',a:'The Ethiopian tradition',w:['Every Protestant Bible','No tradition']}]},
 {t:'Tobit & Yehudit', mins:5, secs:[
   {h:'Tobit: providence with a dog',t:'Tobit is scripture\u2019s road-trip novella: a blind, charitable exile sends his son Toviyah on a journey with a hired companion — secretly the angel Refael — plus, delightfully, the family dog. A dangerous fish becomes medicine, a cursed bride becomes a beloved wife, and sight returns. Its quiet thesis: in exile\u2019s ordinary errands, heaven walks alongside.'},
   {h:'Yehudit: courage in a crisis',t:'Judith is its fierce counterpart: an invading general besieges her town, the elders waver, and a widow of prayer and nerve walks into the enemy camp and ends the war herself. The book is a study in faith as boldness — and in how the canon\u2019s women repeatedly rescue the covenant people when official leadership blinks.'},
   {h:'Reading novellas as Scripture',t:'Both books wear signals of theological fiction — playful chronology, archetypal villains — much as Yehoshua HaMashiach\u2019s parables do. Their truth is the load they carry: almsgiving matters, angels attend the faithful, courage is contagious. Traditions that canonized them understood that a story can be inspired without being a newspaper.'}],
  quiz:[
   {q:'Toviyah\u2019s traveling companion is secretly…',a:'The angel Refael',w:['A Persian prince','His grandfather']},
   {q:'Judith saves her town by…',a:'Bold action inside the enemy camp',w:['Paying tribute','Fleeing to Egypt']},
   {q:'These books are best read as…',a:'Inspired theological novellas',w:['Court records','Astronomy manuals']}]},
 {t:'Maccabees & Meqabyan', mins:5, secs:[
   {h:'The hammer\u2019s history',t:'1 Maccabees is sober war history: Antiochus IV desecrates the temple, and the priest Mattityahu\u2019s family — led by Judah "the Hammer" — fights a guerrilla war to win it back, rededicating it in 164 BCE. 2 Maccabees retells the era with theological fire, giving the canon its most vivid martyrs and bold statements of resurrection hope.'},
   {h:'Meqabyan is not Maccabees',t:'Here\u2019s the clarification even scholars trip on: Ethiopia\u2019s three books of Meqabyan are entirely different works — Ge\u2019ez homilies featuring their own heroes (a rebel named Meqabis, faithful brothers under a different tyrant) and long meditations on sin, repentance, and the soul. Shared title, separate books. Ethiopia canonized Meqabyan and, notably, not Greek Maccabees.'},
   {h:'Why both matter to the 89',t:'Together they complete the merged shelf\u2019s logic: Maccabees supplies the history that lights Hanukkah and bridges to the Gospels\u2019 political world; Meqabyan supplies Ethiopia\u2019s pastoral voice on endurance. Our count of 89 exists precisely because both families of books deserve their own named places on the shelf.'}],
  quiz:[
   {q:'"Maccabee" is remembered as meaning…',a:'The hammer',w:['The scribe','The shepherd']},
   {q:'The books of Meqabyan are…',a:'Distinct Ethiopian works, not Greek Maccabees',w:['Exact translations of Maccabees','Lost forever']},
   {q:'2 Maccabees is notable for its early hope in…',a:'Resurrection',w:['Sea travel','Coinage']}]},
 {t:'Wisdom\u2019s Extra Voices', mins:5, secs:[
   {h:'Wisdom of Shlomo',t:'Written in polished Greek by an Alexandrian Jew speaking in Shlomo\u2019s voice, Wisdom argues that the righteous who suffer are held by Yah — their hope "full of immortality" — and paints Lady Wisdom as the radiant breath of divine glory. It is the canon\u2019s great handshake between Jerusalem and Athens, and early Christians heard HaMashiach in its portrait of the suffering just one.'},
   {h:'Sirach: a grandfather\u2019s course',t:'Sirach (Ecclesiasticus) is fifty-one chapters of street-level wisdom — friendship, money, speech, honoring parents and physicians — from Yeshua ben Sira, the only book on the shelf whose author signs his name, translated lovingly by his grandson. If Proverbs is a seminar, Sirach is the whole degree, honey-practical and quotable for life.'},
   {h:'The prayer of Menasheh',t:'Judah\u2019s worst king, Menasheh, repents in Babylonian chains — and tradition supplies the prayer: fifteen verses of flawless contrition. "I have sinned above the number of the sands of the sea… yet I know your mercy is greater." Churches have prayed it for two millennia. The shelf\u2019s smallest treasure may be its most useful: a template for coming home.'}],
  quiz:[
   {q:'Wisdom of Shlomo blends Hebrew faith with…',a:'Greek philosophy',w:['Roman law','Norse myth']},
   {q:'The only book whose author names himself is…',a:'Sirach (Yeshua ben Sira)',w:['Genesis','Judith']},
   {q:'The Prayer of Menasheh is a model of…',a:'Repentance',w:['Battle strategy','Temple architecture']}]}
]}

/* ---- streak ---- */
function dayStr(d){ return d.toISOString().slice(0,10); }
function touchStreak(){
  const today=dayStr(new Date());
  if(S.lastDay===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  S.streak = (S.lastDay===dayStr(y)) ? S.streak+1 : 1;
  S.lastDay=today; save(); chips();
}

/* ---- xp & levels ---- */
function levelOf(xp){ let t=SITE.levels[0][1]; for(const [n,name] of SITE.levels){ if(xp>=n) t=name; } return t; }
function nextLevelAt(xp){ for(const [n] of SITE.levels){ if(xp<n) return n; } return null; }
function addXp(n){ S.xp+=n; save(); chips(); }
function chips(){
  $('streakChip').innerHTML='🔥 <b>'+S.streak+'</b><span class="sub">day streak</span>';
  $('xpChip').innerHTML='✦ <b>'+S.xp+'</b><span class="sub">'+levelOf(S.xp)+'</span>';
}

/* ---- sound (subtle) ---- */
let AC=null; const ac=()=>{ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}} return AC; };
function tone(f,d,dl=0,v=.06,type='sine'){ if(!S.sound)return; const c=ac(); if(!c)return;
  const o=c.createOscillator(),g=c.createGain(); o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);
  const t=c.currentTime+dl; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.start(t);o.stop(t+d+.05); }
const sfx={ tick(){tone(660,.06)}, yes(){tone(523,.09);tone(784,.12,.09)}, no(){tone(196,.16,0,.05,'triangle')},
  win(){[523,659,784,1047].forEach((f,i)=>tone(f,.12,i*.08,.07))}, combo(n){tone(660+n*110,.1,0,.07)} };
$('sndBtn').addEventListener('click',()=>{S.sound=!S.sound;save();$('sndBtn').textContent=S.sound?'🔊':'🔇';});
$('sndBtn').textContent=S.sound?'🔊':'🔇';

/* ---- listen (TTS) ---- */
let pv=null;
function pickV(){ if(!('speechSynthesis' in window))return; const vs=speechSynthesis.getVoices();
  const en=vs.filter(v=>/^en/i.test(v.lang));
  pv=en.find(v=>v.localService)||en[0]||vs[0]; }
if('speechSynthesis' in window){ pickV(); speechSynthesis.onvoiceschanged=pickV; }
function speak(t,btn){
  if(!('speechSynthesis' in window)) return;
  if(speechSynthesis.speaking){ speechSynthesis.cancel(); if(btn)btn.textContent='▷ Listen'; return; }
  const u=new SpeechSynthesisUtterance(t); if(pv)u.voice=pv; u.rate=1.0;
  if(btn){ btn.textContent='■ Stop'; u.onend=()=>btn.textContent='▷ Listen'; }
  speechSynthesis.speak(u);
}

const lKey=(p,l)=>p+'-'+l;
function pathDone(p){ return PATHS[p].lessons.filter((_,l)=>S.done[lKey(p,l)]).length; }
function totalDone(){ return Object.keys(S.done).length; }
function totalLessons(){ return PATHS.reduce((s,p)=>s+p.lessons.length,0); }
function nextUp(){
  if(S.last){ const [p,l]=S.last; if(!S.done[lKey(p,l)]) return [p,l]; }
  for(let p=0;p<PATHS.length;p++) for(let l=0;l<PATHS[p].lessons.length;l++) if(!S.done[lKey(p,l)]) return [p,l];
  return null;
}

/* ---- LESSON (stepper + quiz) ---- */
let cur={p:0,l:0,step:0,correct:0};
function openLesson(p,l){
  cur={p,l,step:0,correct:0};
  S.last=[p,l]; save();
  renderStep();
  show('v-lesson');
}
function renderStep(){
  const P=PATHS[cur.p], L=P.lessons[cur.l];
  const nSecs=L.secs.length, nQ=L.quiz.length, total=nSecs+nQ;
  const pct=Math.round(cur.step/total*100);
  let h=`<div class="lessonwrap">
    <button class="back" onclick="openPath(${cur.p})">← ${P.title}</button>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <h2 style="font-size:clamp(22px,3.6vw,30px)">${L.t}</h2>
      <span style="color:var(--faint);font-size:13px">${Math.min(cur.step+1,total)} / ${total}</span></div>
    <div class="progressbar"><i style="width:${pct}%"></i></div>`;

  if(cur.step<nSecs){
    const sec=L.secs[cur.step];
    h+=`<div class="glass seccard">
      <span class="tag" style="border-color:${P.color}55;color:${P.color}">Part ${cur.step+1}</span>
      <h3 style="margin-top:12px">${sec.h}</h3><p>${sec.t}</p>
      <div class="secfoot">
        <button class="btn" onclick="stepNext()">${cur.step<nSecs-1?'Continue →':'To the questions →'}</button>
        <button class="listen" id="listenBtn">▷ Listen</button>
        <button class="listen" id="moreBtn">✚ Learn more</button>
      </div></div>`;
  } else {
    const qi=cur.step-nSecs, Q=L.quiz[qi];
    const opts=[Q.a,...Q.w].sort(()=>Math.random()-.5);
    h+=`<div class="glass seccard">
      <span class="tag" style="border-color:${P.color}55;color:${P.color}">Question ${qi+1} of ${nQ}</span>
      <h3 style="margin-top:12px;font-family:Inter;font-weight:600;font-size:20px">${Q.q}</h3>
      <div style="margin-top:16px" id="qbox">`;
    opts.forEach(o=>{ h+=`<button class="qopt" onclick="answer(this,${JSON.stringify(o===Q.a)})">${o}</button>`; });
    h+=`</div><div class="qfeed" id="qfeed"></div></div>`;
  }
  h+=`</div>`;
  $('v-lesson').innerHTML=h;
  const lb=$('listenBtn');
  if(lb){ const sec=L.secs[cur.step]; lb.onclick=()=>speak(sec.h+'. '+sec.t,lb); }
  const mb=$('moreBtn');
  if(mb){ const sec=L.secs[cur.step]; mb.onclick=()=>openMore(P,sec); }
  window.scrollTo({top:0});
}
function stepNext(){ sfx.tick(); cur.step++; renderStep(); }
function answer(btn,ok){
  const box=$('qbox');
  if(box.dataset.locked) return;
  if(ok){
    box.dataset.locked=1; btn.classList.add('right'); sfx.yes(); cur.correct++;
    $('qfeed').style.color='var(--a1)'; $('qfeed').textContent='Correct ✦';
    setTimeout(()=>{ cur.step++;
      const L=PATHS[cur.p].lessons[cur.l];
      if(cur.step>=L.secs.length+L.quiz.length) finishLesson(); else renderStep();
    },700);
  } else {
    btn.classList.add('wrong'); btn.disabled=true; sfx.no();
    $('qfeed').style.color='var(--a3)'; $('qfeed').textContent='Not quite — try again.';
  }
}
function finishLesson(){
  const P=PATHS[cur.p], L=P.lessons[cur.l];
  const first=!S.done[lKey(cur.p,cur.l)];
  const xp=(first?30:8)+cur.correct*(first?15:4);
  S.done[lKey(cur.p,cur.l)]=true; touchStreak(); addXp(xp); save();
  const nu=nextUp();
  $('doneEmoji').textContent=P.emoji;
  $('doneTitle').textContent='Lesson complete';
  $('doneSub').textContent=L.t+' · '+cur.correct+'/'+L.quiz.length+' correct'+(first?'':' · review');
  $('doneXp').textContent='+'+xp+' XP · '+levelOf(S.xp);
  if(nu){ const NL=PATHS[nu[0]].lessons[nu[1]];
    $('nextTease').innerHTML='Up next: <b>'+NL.t+'</b> · '+PATHS[nu[0]].emoji+' '+PATHS[nu[0]].title+' · '+NL.mins+' min';
    $('doneNext').textContent='Keep going →';
    $('doneNext').onclick=()=>{ $('done').classList.remove('on'); openLesson(nu[0],nu[1]); };
  } else {
    $('nextTease').innerHTML='Every lesson complete. <b>'+SITE.arenaName+'</b> awaits.';
    $('doneNext').textContent='Enter '+SITE.arenaName+' →';
    $('doneNext').onclick=()=>{ $('done').classList.remove('on'); openArena(); };
  }
  $('doneHome').onclick=()=>{ $('done').classList.remove('on'); home(); };
  $('done').classList.add('on'); sfx.win();
}

let A={qs:[],i:0,score:0,combo:0,best:0,xp:0};
function arenaBank(){
  const bank=[...ARENA_EXTRA];

  return bank;
}
function openArena(){
  const bank=arenaBank().sort(()=>Math.random()-.5).slice(0,10);
  A={qs:bank,i:0,score:0,combo:0,best:0,xp:0};
  renderArenaQ();
  show('v-arena');
}
function mult(){ return A.combo>=6?3:A.combo>=3?2:1; }
function renderArenaQ(){
  if(A.i>=A.qs.length) return arenaEnd();
  const Q=A.qs[A.i];
  const opts=[Q.a,...Q.w].sort(()=>Math.random()-.5);
  let h=`<button class="back" onclick="home()">← Home</button>
  <div class="arenatop">
    <span class="tag">Question ${A.i+1} / ${A.qs.length}</span>
    <span class="tag">Score ${A.score}</span>
    <span class="spacer"></span>
    <span class="combo ${A.combo>=3?'hot':''}">×${mult()} combo</span>
  </div>
  <div class="glass arenaq"><h3>${Q.q}</h3><div style="margin-top:16px" id="abox">`;
  opts.forEach(o=>{ h+=`<button class="qopt" onclick="arenaAnswer(this,${JSON.stringify(o===Q.a)})">${o}</button>`; });
  h+=`</div><div class="qfeed" id="afeed"></div></div>`;

}
function arenaAnswer(btn,ok){
  const box=$('abox'); if(box.dataset.locked) return; box.dataset.locked=1;
  if(ok){
    btn.classList.add('right');
    A.combo++; A.best=Math.max(A.best,mult());
    const gain=10*mult(); A.score++; A.xp+=gain;
    sfx.combo(Math.min(A.combo,6));
    $('afeed').style.color='var(--a1)'; $('afeed').textContent='+'+gain+' XP';
  } else {
    btn.classList.add('wrong'); A.combo=0; sfx.no();

  }
  setTimeout(()=>{A.i++;renderArenaQ();},650);
}

  sfx.win(); chips();
}

  h+=`</div><div class="breathwrap" id="bwrap"></div>`;

function stopBreath(){ if(BT){clearTimeout(BT);BT=null;} if('speechSynthesis' in window) speechSynthesis.cancel(); }
function startBreath(i){
  stopBreath();
  const st=STUDIO[i];
  $('bwrap').innerHTML=`<div id="bcircle">Ready…</div>
    <p style="color:var(--dim);margin-top:22px" id="bstatus">${st.name} · round 1 of ${st.cycles}</p>
    <button class="btn ghost" onclick="stopBreath();document.getElementById('bcircle').textContent='Paused';">Stop</button>`;
  $('bwrap').scrollIntoView({behavior:'smooth'});
  let round=0, phase=0;
  function step(){
    const c=$('bcircle'); if(!c) return;
    if(phase>=st.pattern.length){ phase=0; round++;
      if(round>=st.cycles){ c.className=''; c.style.setProperty('--dur','1s'); c.textContent='Complete ✦';
        $('bstatus').textContent='Well done. +6 XP'; touchStreak(); addXp(6); sfx.win(); return; }
      $('bstatus').textContent=st.name+' · round '+(round+1)+' of '+st.cycles;
    }
    const [label,secs]=st.pattern[phase];
    c.style.setProperty('--dur',secs+'s');
    c.className = /in/i.test(label)?'in':/out/i.test(label)?'out':'hold';
    c.textContent=label+' · '+secs;
    sfx.tick();
    phase++;
    BT=setTimeout(step, secs*1000);
  }
  BT=setTimeout(step,900);
}

['Gentile','Anyone not of Israel. The letters of Sha\u2019ul wrestle with how the nations join the covenant family.'],
['Gospel','\u201CGood news\u201D — the four accounts of Yehoshua HaMashiach\u2019s life, plus the message itself.'],
['Epistle','Simply \u201Cletter.\u201D Twenty-two of the 89 books are letters to young communities.'],
['Apocalypse','\u201CUnveiling\u201D — literature that pulls back the curtain on history\u2019s meaning (Daniel, Revelation, Enoch). Not primarily about catastrophe.'],
['Passover (Pesach)','The night Yah spared Israel in Egypt and broke Pharaoh\u2019s grip — the exodus meal Yehoshua kept at the Last Supper.'],
['Shabbat','The seventh-day rest woven into creation itself — a weekly declaration that the world does not run on human striving.'],
['Temple','The house of Yah in Jerusalem: Shlomo\u2019s (destroyed 586 BCE), the second (destroyed 70 CE). Center of gravity for half the canon.'],
['Ark of the Covenant','The gold-covered chest holding the tablets — Israel\u2019s throne-footstool of Yah. Ethiopian tradition holds it rests in Axum.'],

['Manna','The bread-from-heaven that fed Israel forty years — daily, ungatherable in excess, a lesson in trust.'],
['Jubilee','Every fiftieth year: debts released, land returned, captives freed (Leviticus 25). The economy of mercy.'],
['Atonement (Kippur)','Covering and reconciling — the yearly Day of Atonement, and the language the letters use for the cross.'],
['Halleluyah','\u201CPraise Yah!\u201D — the oldest worship word, hiding the Name in plain sight in every language on earth.'],
['Amen','\u201CFirm, true, so be it\u201D — agreement you can stand on.'],
['Selah','A mysterious pause-mark in the Psalms — probably \u201Cstop and let that land.\u201D'],
['Maccabee','\u201CHammer\u201D — nickname of Yehudah, whose revolt (167 BCE) rededicated the Temple; the story behind Hanukkah, told in 1–2 Maccabees.'],

function openMap(){
  MQ=null;
  let h=`<button class="back" onclick="home()">← Home</button>
  <div class="pathhead"><span class="pemoji">🗺️</span><div><h2>The Map of the 89</h2><p>A storyteller\u2019s map, not a surveyor\u2019s — tap any place.</p></div></div>
  <div id="mapBox">${drawMap()}</div>

function wireMap(){
  document.querySelectorAll('#mapBox .mapdot').forEach(g=>g.onclick=()=>{
    const p=PLACES.find(x=>x.id===g.dataset.id);
    if(MQ){ mapGuess(p); return; }
    $('mapBox').innerHTML=drawMap(p.id); wireMap();
    $('mapInfo').innerHTML=`<h3 style="margin:0 0 4px;font-size:18px">${p.n}</h3><div class="meta" style="margin-bottom:8px">${p.who}</div><p style="margin:0;line-height:1.65">${p.what}</p>
      <button class="listen" style="margin-top:10px" onclick="speak('${p.n.replace(/'/g,"\\'")}. '+PLACES.find(x=>x.id==='${p.id}').what,this)">▷ Listen</button>`;
  });
}
function startMapQuiz(){
  const order=[...PLACES].sort(()=>Math.random()-.5).slice(0,8);
  MQ={order,i:0,score:0};
  mapAsk();
}
function mapAsk(){
  const p=MQ.order[MQ.i];
  $('mapBox').innerHTML=drawMap(); wireMap();
  $('mapInfo').innerHTML=`<div class="meta">Round ${MQ.i+1} of ${MQ.order.length} · score ${MQ.score}</div>
    <h3 style="margin:6px 0 4px;font-size:17px">Where did this happen? Tap the spot:</h3>
    <p style="margin:0;line-height:1.6">${p.what.split('.')[0]}. <i style="color:var(--faint)">(${p.who})</i></p>`;
}
function mapGuess(guess){
  const p=MQ.order[MQ.i];
  if(guess.id===p.id){ MQ.score++; S.xp+=10; save(); chips();
    $('mapInfo').innerHTML=`<h3 style="margin:0;color:#7fc98f">✓ ${p.n} — exactly right. ✦ +10</h3>`; }
  else $('mapInfo').innerHTML=`<h3 style="margin:0;color:#d98a6a">✗ That\u2019s ${guess.n} — it was <b>${p.n}</b>.</h3>`;
  $('mapBox').innerHTML=drawMap(p.id); wireMap();
  MQ.i++;
  setTimeout(()=>{ if(!MQ)return;
    if(MQ.i>=MQ.order.length){
      $('mapInfo').innerHTML=`<h3 style="margin:0 0 6px">🏁 ${MQ.score} of ${MQ.order.length}!</h3><p style="margin:0;color:var(--dim)">${MQ.score>=7?'You could guide the caravans yourself.':MQ.score>=4?'The roads are becoming familiar.':'Every pilgrim starts somewhere — walk the map and run it back.'}</p>
        <button class="btn big" style="margin-top:12px" onclick="startMapQuiz()">Run it back →</button>`;
      MQ=null; $('mapBox').innerHTML=drawMap(); wireMap();
    } else mapAsk();
  },1600);
}

(function(){
  const items=[['🏠','Home',()=>home(),'v-home']];
  items.push(['⚔️',SITE.arenaName.split(' ')[0],()=>openArena(),'v-arena']);
  if(typeof STUDIO!=='undefined'&&STUDIO)items.push(['🫁','Studio',()=>openStudio(),'v-studio']);
  if(typeof LIBRARY!=='undefined'&&LIBRARY)items.push(['🏛','Library',()=>openLibrary(),'v-library']);
  items.push(['⚙','Settings',()=>$('setBtn').click(),null]);
  const nav=document.createElement('nav');nav.id='bnav';
  nav.innerHTML=items.map((it,i)=>'<button data-v="'+(it[3]||'')+'"><span class="bi">'+it[0]+'</span>'+it[1]+'</button>').join('');
  document.body.appendChild(nav);
  nav.querySelectorAll('button').forEach((b,i)=>b.onclick=items[i][2]);
})();
const _show=show;
show=function(id){ _show(id);
  document.querySelectorAll('#bnav button').forEach(b=>b.classList.toggle('on',b.dataset.v===id||(id==='v-path'||id==='v-lesson')&&b.dataset.v==='v-home'));
};

/* ---- boot ---- */
$('vtag').textContent=SITE.vtag;
chips();
home();
/* ENGINE_END */
</script>
</body>
</html>
